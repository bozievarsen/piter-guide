<body>

<div class="header">
    <div class="header-left">
        <h1>🍞 <span>Хлеб</span> и <span>Зрелища</span></h1>
        <div class="file-input-wrapper">
            <button class="btn">📂 Загрузить CSV</button>
            <input type="file" accept=".csv" onchange="importCSV(event)">
        </div>
    </div>
    <div>
        <button class="btn btn-location" id="locationBtn" onclick="getMyLocation()">📍 Рядом со мной</button>
        <button class="btn btn-map" onclick="showAllOnMap()">🗺️ Карта</button>
        <button class="btn btn-primary" onclick="openModal()">➕ Добавить</button>
        <button class="btn btn-theme" onclick="toggleTheme()" id="themeBtn">🌙</button>
        <button class="btn btn-danger" onclick="resetAll()">↺</button>
    </div>
</div>

<div class="filters">
    <input type="text" id="searchInput" placeholder="🔍 Поиск..." oninput="render()">
    <span class="tag active" data-tag="all" onclick="setFilter('all')">Все</span>
    <span class="tag" data-tag="бургеры" onclick="setFilter('бургеры')">🍔</span>
    <span class="tag" data-tag="коктейли" onclick="setFilter('коктейли')">🍸</span>
    <span class="tag" data-tag="пиво" onclick="setFilter('пиво')">🍺</span>
    <span class="tag" data-tag="завтрак" onclick="setFilter('завтрак')">☀️</span>
    <span class="tag tag-location" id="nearbyTag" data-tag="nearby" onclick="toggleNearbyFilter()">📍 Ближайшие</span>
    <span class="stats" id="stats">0 мест</span>
</div>

<div class="grid" id="gridContainer"></div>

<div class="fullscreen-overlay" id="fullscreenOverlay">
    <div class="fullscreen-title">
        <span>🗺️ Все места</span>
        <span class="my-location-info" id="fullscreenLocationInfo"></span>
    </div>
    <div class="fullscreen-map" id="fullscreenMap">
        <button class="fullscreen-close" onclick="closeFullscreen()">✕</button>
    </div>
</div>

<div class="modal-overlay" id="modalOverlay">
    <div class="modal">
        <h2 id="modalTitle">➕ Добавить место</h2>
        <label>Название</label>
        <input id="editName" placeholder="Бюро">
        <label>Адрес</label>
        <input id="editAddress" placeholder="ул. Жуковского, 29">
        <label>Координаты</label>
        <div class="coord-group">
            <input id="editLat" placeholder="59.9357">
            <input id="editLon" placeholder="30.3558">
            <button onclick="openPicker()">📍 Выбрать</button>
        </div>
        <div class="map-picker" id="mapPicker"></div>
        <label>Ради чего?</label>
        <textarea id="editReason" placeholder="Бургеры / Тартар"></textarea>
        <label>Теги</label>
        <input id="editTags" placeholder="бургеры, десерты">
        <div style="margin-top:10px;">

            <button class="btn-cancel" onclick="closeModal()">Отмена</button>
            <button class="btn-save" onclick="savePlace()">💾 Сохранить</button>

</div>

<div class="toast" id="toast"></div>

// ===== ДАННЫЕ =====
const defaultData = [

    { name: '', address: 'Ропшинская улица, 3-5Б', lat: 59.958061, lon: 30.297821, reason: 'Бургеры / Тартар / Фри с трюфельным / десерты', tags: ['бургеры'], favorite: false },
    { name: '', address: 'Большой проспект Васильевского острова, 16/14Б', lat: 59.939343, lon: 30.285361, reason: 'Бургеры / Тартар / Фри с трюфельным / десерты', tags: ['бургеры'], favorite: false },
    { name: '', address: 'Садовая улица, 13-15/50', lat: 59.934795, lon: 30.335038, reason: 'Бургеры / Тартар / Фри с трюфельным / десерты', tags: ['бургеры'], favorite: false },
    { name: '', address: 'Средний проспект Васильевского острова, 53', lat: 59.941209, lon: 30.271276, reason: 'Бургеры / Тартар / Фри с трюфельным / десерты', tags: ['бургеры'], favorite: false },
    { name: '', address: 'Коломяжский проспект, 17к2', lat: 60.005333, lon: 30.300983, reason: 'Бургеры / Тартар / Фри с трюфельным / десерты', tags: ['бургеры'], favorite: false },
    { name: 'Федя дичь', address: 'Садовая улица, 7-9-11, Санкт-Петербург, 191181', lat: null, lon: null, reason: 'Шашлыки / Чебуреки / Фирменное томатное пиво на кране / алкогольный тархун / крылья / грибы / перцы / картошка', tags: ['шашлык', 'пиво'], favorite: false },
    { name: 'Полторы комнаты', address: 'улица Маяковского, 34/4, Санкт-Петербург, 191014', lat: 59.940129, lon: 30.355045, reason: 'Кровавая Мэри / черемша / коктейли / подача и атмосфера / рекомендую в будние сразу после открытия, иначе стоя в духоте без интернета можно не кайфануть', tags: ['коктейли'], favorite: false },
    { name: 'Meal', address: 'Литейный проспект, 17-19, Санкт-Петербург, 191028', lat: 59.943760, lon: 30.347644, reason: 'Тартар / десерты / атмосфера', tags: ['десерты'], favorite: false },
    { name: 'Сибаристика', address: 'набережная Обводного канала, 199-201К, Санкт-Петербург, 190020', lat: 59.910412, lon: 30.284159, reason: 'Просторная кофейня с профессиональным подходом к напиткам / Завтраки', tags: ['завтрак', 'кофе'], favorite: false },
    { name: 'AF Brew Taproom', address: 'Курляндская улица, 48, Санкт-Петербург, 190020', lat: 59.911169, lon: 30.267493, reason: 'Атмосферный пивной бар с сырной едой', tags: ['пиво', 'сыр'], favorite: false },
    { name: 'Solaris', address: 'Курляндская улица, 49, Санкт-Петербург, 198035', lat: 59.911620, lon: 30.267415, reason: 'Шикарный вид на город', tags: ['вид'], favorite: false },

    { name: 'Frank by basta', address: 'проспект Славы, 21, Санкт-Петербург, 192239', lat: 59.855462, lon: 30.378723, reason: 'Рёбра / Фри с трюфельным', tags: ['бургеры', 'мясо'], favorite: false },
    { name: 'Frank by basta', address: 'проспект Энгельса, 124к1, Санкт-Петербург, 194356', lat: 60.039908, lon: 30.324124, reason: 'Рёбра / Фри с трюфельным', tags: ['бургеры', 'мясо'], favorite: false },
    { name: 'Frank by basta', address: 'улица Рубинштейна, 29/28, Санкт-Петербург, 191002', lat: 59.926702, lon: 30.342297, reason: 'Рёбра / Фри с трюфельным', tags: ['бургеры', 'мясо'], favorite: false },
    { name: 'Frank by basta', address: 'Большой проспект Петроградской стороны, 35, Санкт-Петербург, 197198', lat: 59.959579, lon: 30.302438, reason: 'Рёбра / Фри с трюфельным', tags: ['бургеры', 'мясо'], favorite: false },
    { name: 'Frank by basta', address: 'Московский проспект, 175, Санкт-Петербург, 196070', lat: 59.860152, lon: 30.320333, reason: 'Рёбра / Фри с трюфельным', tags: ['бургеры', 'мясо'], favorite: false }
];

// ===== СОСТОЯНИЕ =====
let places = [];
let editingIndex = null;
let currentFilter = 'all';
let isDark = false;
let pickerMap = null;
let fullMap = null;
let myLocation = null; // { lat, lon }
let isNearbyMode = false;
let isLocating = false;

// ===== ЗАГРУЗКА =====
function loadData() {
    const saved = localStorage.getItem('hlebData');
    if (saved) {
        try { places = JSON.parse(saved); if (!places.length) places = JSON.parse(JSON.stringify(defaultData)); }
        catch { places = JSON.parse(JSON.stringify(defaultData)); }
    } else {
        places = JSON.parse(JSON.stringify(defaultData));
    }
    // Восстанавливаем избранное
    places.forEach(p => { if (p.favorite === undefined) p.favorite = false; });
    saveData();
}
function saveData() { localStorage.setItem('hlebData', JSON.stringify(places)); }

// ===== ГЕОЛОКАЦИЯ =====
function getMyLocation() {
    if (isLocating) return;
    
    if (!navigator.geolocation) {
        showToast('⚠️ Ваш браузер не поддерживает геолокацию');
        return;
    }
    
    const btn = document.getElementById('locationBtn');
    btn.innerHTML = '<span class="loading-spinner"></span> Определение...';
    btn.disabled = true;
    isLocating = true;
    
    navigator.geolocation.getCurrentPosition(
        (pos) => {
            myLocation = {
                lat: pos.coords.latitude,
                lon: pos.coords.longitude
            };
            isLocating = false;
            btn.innerHTML = '📍 Рядом со мной';
            btn.disabled = false;
            btn.classList.add('active');
            
            // Включаем режим "Ближайшие"
            isNearbyMode = true;
            document.getElementById('nearbyTag').classList.add('active');
            
            showToast(`📍 Ваше местоположение определено (${myLocation.lat.toFixed(4)}, ${myLocation.lon.toFixed(4)})`);
            
            // Обновляем отображение
            render();
            
            // Если карта открыта — обновляем её
            if (fullMap && document.getElementById('fullscreenOverlay').classList.contains('show')) {
                updateFullscreenMap();
            }
        },
        (err) => {
            isLocating = false;
            btn.innerHTML = '📍 Рядом со мной';
            btn.disabled = false;
            
            let msg = '⚠️ Не удалось определить местоположение';
            if (err.code === 1) msg = '⚠️ Доступ к геолокации запрещён. Разрешите в браузере или введите координаты вручную.';
            else if (err.code === 2) msg = '⚠️ Сигнал GPS слабый, попробуйте позже';
            else if (err.code === 3) msg = '⚠️ Таймаут, попробуйте ещё раз';
            
            showToast(msg);
            
            // Предлагаем ввести координаты вручную
            setTimeout(() => {
                if (confirm('Хотите ввести координаты вручную?')) {
                    const lat = prompt('Введите широту (например, 59.9343):');
                    const lon = prompt('Введите долготу (например, 30.3351):');
                    if (lat && lon) {
                        myLocation = { lat: parseFloat(lat), lon: parseFloat(lon) };
                        isNearbyMode = true;
                        document.getElementById('nearbyTag').classList.add('active');
                        btn.classList.add('active');
                        render();
                        showToast('📍 Координаты установлены вручную');
                    }
                }
            }, 1000);
        },
        { enableHighAccuracy: true, timeout: 10000, maximumAge: 60000 }
    );
}

function toggleNearbyFilter() {
    if (!myLocation) {
        showToast('📍 Сначала определите местоположение (кнопка "Рядом со мной")');
        return;
    }
    isNearbyMode = !isNearbyMode;
    const tag = document.getElementById('nearbyTag');
    if (isNearbyMode) {
        tag.classList.add('active');
        showToast('📏 Сортировка по расстоянию включена');
    } else {
        tag.classList.remove('active');
        showToast('📏 Сортировка по расстоянию выключена');
    }
    render();
}

// ===== РАСЧЁТ РАССТОЯНИЯ (формула гаверсинусов) =====
function calculateDistance(lat1, lon1, lat2, lon2) {
    if (lat1 == null || lon1 == null || lat2 == null || lon2 == null) return Infinity;
    const R = 6371; // радиус Земли в км
    const dLat = (lat2 - lat1) * Math.PI / 180;
    const dLon = (lon2 - lon1) * Math.PI / 180;
    const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
              Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
              Math.sin(dLon/2) * Math.sin(dLon/2);
    const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    return R * c; // в км
}

function formatDistance(km) {
    if (km === Infinity || km === null || isNaN(km)) return null;
    if (km < 1) return Math.round(km * 1000) + ' м';
    return km.toFixed(1) + ' км';
}

// ===== ИМПОРТ CSV =====
function importCSV(event) {
    const file = event.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(e) {
        try {
            const text = e.target.result;
            const lines = text.split('\n').filter(line => line.trim());
            if (lines.length < 2) { showToast('⚠️ Файл пуст или повреждён'); return; }
            
            const headers = lines[0].split(',').map(h => h.trim().replace(/^"|"$/g, ''));
            const nameIdx = headers.findIndex(h => /название/i.test(h));
            const addressIdx = headers.findIndex(h => /адрес/i.test(h));
            const coordsIdx = headers.findIndex(h => /координат/i.test(h) || /lat.*lon/i.test(h));
            const reasonIdx = headers.findIndex(h => /ради/i.test(h) || /чего/i.test(h));
            
            if (addressIdx === -1 && nameIdx === -1) {
                showToast('⚠️ Не найдены колонки "Название" или "Адрес"');
                return;
            }
            
            const newPlaces = [];
            for (let i = 1; i < lines.length; i++) {
                const row = parseCSVLine(lines[i]);
                if (row.length < Math.max(addressIdx, nameIdx, 0) + 1) continue;
                
                const name = nameIdx !== -1 ? row[nameIdx]?.trim() || '' : '';
                const address = addressIdx !== -1 ? row[addressIdx]?.trim() || '' : '';
                const reason = reasonIdx !== -1 ? row[reasonIdx]?.trim() || '' : '';
                let lat = null, lon = null;
                
                if (coordsIdx !== -1 && row[coordsIdx]) {
                    const coordStr = row[coordsIdx].trim().replace(/^"|"$/g, '');
                    const parts = coordStr.split(',').map(s => parseFloat(s.trim()));
                    if (parts.length === 2 && !isNaN(parts[0]) && !isNaN(parts[1])) {
                        lat = parts[0];
                        lon = parts[1];
                    }
                }
                
                let tags = [];
                if (reason) {
                    const tagCandidates = ['бургер', 'коктейль', 'пиво', 'завтрак', 'вид', 'шашлык', 'десерт', 'мясо', 'сыр', 'кофе'];
                    const lowerReason = reason.toLowerCase();
                    tags = tagCandidates.filter(t => lowerReason.includes(t));
                }
                if (!tags.length) tags = ['еда'];
                
                newPlaces.push({ name, address, lat, lon, reason, tags, favorite: false });
            }
            
            if (!newPlaces.length) { showToast('⚠️ Не удалось распарсить данные'); return; }
            
            places = newPlaces;
            saveData();
            render();
            showToast(`✅ Загружено ${places.length} мест`);
        } catch(err) {
            showToast('⚠️ Ошибка при импорте: ' + err.message);
        }
    };
    reader.readAsText(file, 'UTF-8');
    event.target.value = '';
}

function parseCSVLine(line) {
    const result = [];
    let current = '';
    let inQuotes = false;
    for (let i = 0; i < line.length; i++) {
        const char = line[i];
        if (char === '"') {
            inQuotes = !inQuotes;
        } else if (char === ',' && !inQuotes) {
            result.push(current);
            current = '';
        } else {
            current += char;
        }
    }
    result.push(current);
    return result;
}

// ===== ОТРИСОВКА =====
function render() {
    const search = document.getElementById('searchInput').value.toLowerCase().trim();
    
    // Сначала фильтруем
    let filtered = places.filter(p => {
        const text = (p.name + ' ' + p.address + ' ' + p.reason + ' ' + (p.tags||[]).join(' ')).toLowerCase();
        if (!text.includes(search)) return false;
        if (currentFilter !== 'all') {
            const tagText = (p.name + ' ' + p.reason + ' ' + (p.tags||[]).join(' ')).toLowerCase();
            if (!tagText.includes(currentFilter)) return false;
        }
        return true;
    });
    
    // Сортируем по расстоянию, если включён режим "Ближайшие"
    if (isNearbyMode && myLocation) {
        filtered.sort((a, b) => {
            const distA = calculateDistance(myLocation.lat, myLocation.lon, a.lat, a.lon);
            const distB = calculateDistance(myLocation.lat, myLocation.lon, b.lat, b.lon);
            return distA - distB;
        });
    } else {
        // Сортируем по избранному и номеру
        filtered.sort((a, b) => {
            if (a.favorite && !b.favorite) return -1;
            if (!a.favorite && b.favorite) return 1;
            return places.indexOf(a) - places.indexOf(b);
        });
    }
    
    document.getElementById('stats').textContent = filtered.length + ' мест' + (isNearbyMode && myLocation ? ' 📏 по расстоянию' : '');
    
    const grid = document.getElementById('gridContainer');
    if (!filtered.length) {
        grid.innerHTML = `<div class="empty"><span>🧭</span>Ничего не найдено</div>`;
        return;
    }
    
    grid.innerHTML = filtered.map((p, i) => {
        const idx = places.indexOf(p);
        const name = p.name || '📍 Без названия';
        const hasCoords = p.lat != null;
        const dist = (myLocation && hasCoords) ? calculateDistance(myLocation.lat, myLocation.lon, p.lat, p.lon) : null;
        const distText = (dist !== null && dist !== Infinity) ? formatDistance(dist) : null;
        
        return `
            <div class="card">
                <span class="num">#${idx+1}</span>
                ${distText ? `<span class="distance-badge">📏 ${distText}</span>` : ''}
                <div class="card-header">
                    <h3>${escapeHtml(name)}</h3>
                    <button class="favorite-btn ${p.favorite?'active':''}" onclick="toggleFavorite(${idx})">${p.favorite?'❤️':'🤍'}</button>
                </div>
                <div class="address">📍 ${escapeHtml(p.address||'')}</div>
                <div class="reason">${escapeHtml(p.reason||'—')}</div>
                ${hasCoords ? `<div class="mini-map" id="mini_${idx}"></div>` : ''}
                <div class="card-actions">
                    <button class="btn-edit" onclick="editPlace(${idx})">✏️</button>
                    ${hasCoords ? `<button class="btn-map" onclick="showOnMap(${idx})">🗺️</button>` : ''}
                    <button class="btn-delete" onclick="deletePlace(${idx})">🗑</button>
                </div>
            </div>
        `;
    }).join('');
    
    setTimeout(() => {
        filtered.forEach(p => {
            const idx = places.indexOf(p);
            if (p.lat != null) {
                const el = document.getElementById(`mini_${idx}`);
                if (el && window.ymaps) initMiniMap(el, p.lat, p.lon, p.name);
            }
        });
    }, 200);
}

function escapeHtml(t) { if (!t) return ''; const d=document.createElement('div'); d.textContent=t; return d.innerHTML; }

function initMiniMap(el, lat, lon, name) {
    try {
        const map = new ymaps.Map(el, { center: [lat, lon], zoom: 14, controls: [] });
        map.geoObjects.add(new ymaps.Placemark([lat, lon], { balloonContent: name || 'Место' }));
    } catch(e) {}
}

// ===== ФИЛЬТРЫ =====
function setFilter(tag) {
    currentFilter = tag;
    document.querySelectorAll('.tag').forEach(el => el.classList.remove('active'));
    document.querySelector(`.tag[data-tag="${tag}"]`).classList.add('active');
    render();
}

// ===== МОДАЛКА =====
function openModal(data=null, idx=null) {
    const ov = document.getElementById('modalOverlay');
    document.getElementById('modalTitle').textContent = data ? '✏️ Редактировать' : '➕ Добавить';
    document.getElementById('editName').value = data?.name||'';
    document.getElementById('editAddress').value = data?.address||'';
    document.getElementById('editLat').value = data?.lat||'';
    document.getElementById('editLon').value = data?.lon||'';
    document.getElementById('editReason').value = data?.reason||'';
    document.getElementById('editTags').value = (data?.tags||[]).join(', ');
    document.getElementById('editFavorite').checked = data?.favorite||false;
    editingIndex = idx;
    ov.classList.add('show');
    document.getElementById('editName').focus();
}

function closeModal() {
    document.getElementById('modalOverlay').classList.remove('show');
    document.getElementById('mapPicker').style.display = 'none';
    if (pickerMap) { pickerMap.destroy(); pickerMap = null; }
    editingIndex = null;
}

function savePlace() {
    const name = document.getElementById('editName').value.trim();
    const address = document.getElementById('editAddress').value.trim();
    const lat = parseFloat(document.getElementById('editLat').value);
    const lon = parseFloat(document.getElementById('editLon').value);
    const reason = document.getElementById('editReason').value.trim();
    const tags = document.getElementById('editTags').value.split(',').map(t=>t.trim()).filter(Boolean);
    const favorite = document.getElementById('editFavorite').checked;
    if (!address && !name) { showToast('⚠️ Укажите название или адрес'); return; }
    const place = { name, address, lat: isNaN(lat)?null:lat, lon: isNaN(lon)?null:lon, reason, tags: tags.length?tags:['еда'], favorite };
    if (editingIndex !== null) { places[editingIndex] = place; showToast('✅ Обновлено'); }
    else { places.push(place); showToast('✅ Добавлено'); }
    saveData(); closeModal(); render();
}

function editPlace(i) { openModal(places[i], i); }
function deletePlace(i) { if(confirm(`Удалить "${places[i].name||'место'}"?`)) { places.splice(i,1); saveData(); render(); showToast('🗑 Удалено'); } }
function toggleFavorite(i) { places[i].favorite = !places[i].favorite; saveData(); render(); }

// ===== КАРТА-ПИКЕР =====
function openPicker() {
    const el = document.getElementById('mapPicker');
    if (el.style.display === 'block') { el.style.display = 'none'; if(pickerMap){pickerMap.destroy();pickerMap=null;} return; }
    el.style.display = 'block';
    if (!window.ymaps) { showToast('⏳ Карты загружаются...'); return; }
    const lat = parseFloat(document.getElementById('editLat').value) || 59.9343;
    const lon = parseFloat(document.getElementById('editLon').value) || 30.3351;
    try {
        pickerMap = new ymaps.Map(el, { center: [lat, lon], zoom: 13, controls: ['zoomControl'] });
        const pm = new ymaps.Placemark([lat, lon], {}, { draggable: true });
        pickerMap.geoObjects.add(pm);
        pm.events.add('dragend', e => {
            const c = e.get('target').geometry.getCoordinates();
            document.getElementById('editLat').value = c[0].toFixed(6);
            document.getElementById('editLon').value = c[1].toFixed(6);
        });
        pickerMap.events.add('click', e => {
            const c = e.get('coords');
            document.getElementById('editLat').value = c[0].toFixed(6);
            document.getElementById('editLon').value = c[1].toFixed(6);
            pm.geometry.setCoordinates(c);
        });
    } catch(e) { showToast('⚠️ Ошибка карты'); }
}

// ===== ПОЛНОЭКРАННАЯ КАРТА =====
function updateFullscreenMap() {
    if (!fullMap || !window.ymaps) return;
    try {
        // Очищаем карту
        fullMap.geoObjects.removeAll();
        
        // Добавляем места
        const withCoords = places.filter(p => p.lat != null);
        withCoords.forEach(p => {
            fullMap.geoObjects.add(new ymaps.Placemark([p.lat, p.lon], {
                balloonContent: `<strong>${p.name||'Без названия'}</strong><br>${p.address||''}<br>${p.reason||''}`
            }));
        });
        
        // Добавляем мою позицию
        if (myLocation) {
            const myPlacemark = new ymaps.Placemark(
                [myLocation.lat, myLocation.lon],
                { balloonContent: '📍 Вы здесь' },
                {
                    preset: 'islands#blueCircleIcon',
                    iconColor: '#3b82f6'
                }
            );
            fullMap.geoObjects.add(myPlacemark);
            
            // Обновляем информацию
            document.getElementById('fullscreenLocationInfo').textContent = `📍 Вы: ${myLocation.lat.toFixed(4)}, ${myLocation.lon.toFixed(4)}`;
        }
        
        // Масштабируем под все точки
        const allPoints = [...withCoords];
        if (myLocation) allPoints.push(myLocation);
        if (allPoints.length > 1) {
            fullMap.setBounds(allPoints.map(p => [p.lat, p.lon]), { checkZoomRange: true });
        } else if (allPoints.length === 1) {
            fullMap.setCenter([allPoints[0].lat, allPoints[0].lon], 14);
        }
    } catch(e) {
        console.log('Ошибка обновления карты:', e);
    }
}

function showAllOnMap() {
    const ov = document.getElementById('fullscreenOverlay');
    ov.classList.add('show');
    const el = document.getElementById('fullscreenMap');
    if (!window.ymaps) { showToast('⏳ Карты загружаются...'); return; }
    setTimeout(() => {
        const withCoords = places.filter(p => p.lat != null);
        if (!withCoords.length && !myLocation) { showToast('⚠️ Нет координат'); return; }
        try {
            if (fullMap) { fullMap.destroy(); fullMap = null; }
            
            const center = myLocation ? [myLocation.lat, myLocation.lon] : [withCoords[0].lat, withCoords[0].lon];
            fullMap = new ymaps.Map(el, { 
                center: center, 
                zoom: 12, 
                controls: ['zoomControl', 'fullscreenControl', 'geolocationControl'] 
            });
            
            // Добавляем места
            withCoords.forEach(p => {
                fullMap.geoObjects.add(new ymaps.Placemark([p.lat, p.lon], {
                    balloonContent: `<strong>${p.name||'Без названия'}</strong><br>${p.address||''}<br>${p.reason||''}`
                }));
            });
            
            // Добавляем мою позицию
            if (myLocation) {
                const myPlacemark = new ymaps.Placemark(
                    [myLocation.lat, myLocation.lon],
                    { balloonContent: '📍 Вы здесь' },
                    {
                        preset: 'islands#blueCircleIcon',
                        iconColor: '#3b82f6'
                    }
                );
                fullMap.geoObjects.add(myPlacemark);
                document.getElementById('fullscreenLocationInfo').textContent = `📍 Вы: ${myLocation.lat.toFixed(4)}, ${myLocation.lon.toFixed(4)}`;
            }
            
            // Масштабируем
            const allPoints = [...withCoords];
            if (myLocation) allPoints.push(myLocation);
            if (allPoints.length > 1) {
                fullMap.setBounds(allPoints.map(p => [p.lat, p.lon]), { checkZoomRange: true });
            }
        } catch(e) { showToast('⚠️ Ошибка карты'); }
    }, 300);
}

function closeFullscreen() {
    document.getElementById('fullscreenOverlay').classList.remove('show');
    if (fullMap) { fullMap.destroy(); fullMap = null; }
}

function showOnMap(i) {
    const p = places[i];
    if (p.lat == null) { showToast('⚠️ Нет координат'); return; }
    showAllOnMap();
    setTimeout(() => { if (fullMap) fullMap.setCenter([p.lat, p.lon], 15); }, 500);
}

// ===== СБРОС =====
function resetAll() {
    if (confirm('Сбросить к исходному списку?')) {
        places = JSON.parse(JSON.stringify(defaultData));
        saveData(); 
        render(); 
        showToast('🔄 Сброшено');
        // Сбрасываем геолокацию
        myLocation = null;
        isNearbyMode = false;
        document.getElementById('nearbyTag').classList.remove('active');
        document.getElementById('locationBtn').classList.remove('active');
    }
}

// ===== ТЕМА =====
function toggleTheme() {
    isDark = !isDark;
    document.body.classList.toggle('dark', isDark);
    document.getElementById('themeBtn').textContent = isDark ? '☀️' : '🌙';
    localStorage.setItem('hlebTheme', isDark ? 'dark' : 'light');
}
function loadTheme() {
    if (localStorage.getItem('hlebTheme') === 'dark') {
        isDark = true;
        document.body.classList.add('dark');
        document.getElementById('themeBtn').textContent = '☀️';
    }
}

function showToast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    clearTimeout(el._timer);
    el._timer = setTimeout(() => el.classList.remove('show'), 3500);
}

// ===== ЗАПУСК =====
loadData();
loadTheme();
render();

document.getElementById('modalOverlay').addEventListener('click', e => { if (e.target === e.currentTarget) closeModal(); });
document.addEventListener('keydown', e => {
    if (e.key === 'Escape') { closeModal(); closeFullscreen(); }
    if (e.ctrlKey && e.key === 'n') { e.preventDefault(); openModal(); }
});
</script>
